name: Cleanup Expired Frames

on:
  schedule:
    - cron: '0 3 * * *'   # UTC 03:00 = JST 12:00 毎日
  workflow_dispatch:       # 手動実行も可

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Call cleanup API
        run: |
          set -e
          response=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.SITE_URL }}/api/admin/cleanup?limit=500" \
            -H "Authorization: Bearer ${{ secrets.CLEANUP_TOKEN }}")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n1)
          echo "Status: $status"
          echo "Response: $body"
          if [ "$status" -ge 400 ]; then exit 1; fi
